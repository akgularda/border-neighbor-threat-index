<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WTI | World Threat Index</title>
  <meta name="description" content="World Threat Index — global geopolitical threat monitoring by Monarch Castle Technologies." />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/variables.css" />
  <link rel="stylesheet" href="../css/layout.css" />
  <link rel="stylesheet" href="../css/components.css" />
  <link rel="stylesheet" href="wti.css" />
  <script src="../assets/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>

</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand">
        <img src="../logo.png" alt="MCT" class="brand-logo" />
        <div>
          <div class="brand-name">Monarch Castle</div>
          <div class="brand-tag">Defense Intelligence</div>
        </div>
      </div>
      <div class="title-block">
        <div class="product">World Threat Index</div>
        <div class="subtitle">Global threat scoring for 195 countries &amp; major blocs</div>
      </div>
      <div class="status-block">
        <div id="status-pill" class="status-pill">STABLE</div>
        <div class="status-meta">
          <div>LAST</div><span id="last-update">--</span>
          <div>COVERAGE</div><span id="coverage-text">--</span>
        </div>
      </div>
    </header>

    <main class="grid wti-grid">
      <section class="panel metric-panel">
        <div class="metric-card">
          <div class="metric-label">Global Composite</div>
          <div class="metric-value" id="main-index">--</div>
          <div class="metric-meta">
            <div id="status-text">--</div>
            <div id="countries-active">--</div>
          </div>
        </div>
        <div class="panel-block">
          <div class="panel-title">Geopolitical Groups</div>
          <div id="groups-grid" class="weights-grid"></div>
        </div>
        <div class="panel-block">
          <div class="panel-title">Highest Threat</div>
          <div id="top-threats" class="briefing-card"></div>
        </div>
      </section>

      <section class="panel map-panel">
        <div class="panel-title">World Threat Map</div>
        <div class="map-wrap wti-map-wrap">
          <svg id="world-map" viewBox="0 0 960 500" role="img" aria-label="World threat map"></svg>
        </div>
        <div id="country-detail" class="briefing-card">Select a country</div>
      </section>

      <section class="panel stream-panel">
        <div class="panel-title">Country Rankings</div>
        <div class="wti-search">
          <input id="country-search" type="search" placeholder="Search country or ISO code..." />
        </div>
        <div id="rankings-table" class="rankings-table"></div>
        <div class="panel-block" style="margin-top:1rem;">
          <a href="../index.html" class="wti-link">← Border Neighbor Threat Index (BNTI)</a>
        </div>
      </section>
    </main>
  </div>

  <script src="../wti_data.js"></script>
  <script src="js/core.js"></script>
  <script src="js/map.js"></script>
  <script src="js/groups.js"></script>
  <script src="js/rankings.js"></script>
</body>
</html>
